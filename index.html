
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ocean Keeper</title>
    <style>
        /* 모든 디자인을 파일 안에 포함시켰습니다 */
        body { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            background: linear-gradient(180deg, #0077be, #003366); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            font-family: sans-serif; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.2); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            background: #ff7f50; 
            border: none; 
            border-radius: 50px; 
            color: white; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ocean Keeper</h1>
        <p>수족관 게임에 오신 것을 환영합니다!</p>
        <button onclick="alert('게임이 곧 업데이트됩니다!')">게임 시작하기</button>
    </div>
</body>
</html>
